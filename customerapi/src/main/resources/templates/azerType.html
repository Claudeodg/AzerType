<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzerType - Typing Speed Trainer</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script th:src="@{/config.js}" defer></script>
    <script th:src="@{/script4.js}" defer></script>
    <script th:src="@{/main.js}" defer></script>
    <script th:src="@{/apigemini.js}" defer></script>

</head>
<body>
    
    <header>
        <h1>Qwertz</h1>
        <h2>The application to type faster</h2>
        <h3>Qwertz is an online application to learn to type faster on the keyboard :</h3>
    </header>
    <main>
        <div class="optionArea">
            <p>Choose your option and type the proposition that appears in the field below.</p>
            <div class="optionSource">
                <input type="radio" name="optionSource" id="word" value="1" checked>
                <label for="word">Words</label>
                <input type="radio" name="optionSource" id="sentences" value="2">
                <label for="sentences">Sentences</label>
                <input type="radio" name="optionSource" id="ai" value="3">
                <label for="ai">🤖 AI</label>

            </div>
        </div>
        <div id="aiPanel" style="display: none;">
            <select id="aiType">
                <option value="words">Words</option>
                <option value="sentences">Sentences</option>
            </select>

            <select id="aiTheme">
                <option value="general">General</option>
                <option value="nature">Nature</option>
                <option value="technology">Technology</option>
                <option value="cooking">Cooking</option>
                <option value="sports">Sports</option>
                <option value="animals">Animals</option>
                <option value="travel">Travel</option>
            </select>

            <select id="aiLevel">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>

            <input type="number" id="aiCount" value="10" min="5" max="30" style="width: 60px;">
            <button id="btnGenerateAI">▶ Generate</button>
            <span id="aiStatus"></span>
        </div>

        <div class="propositionArea">
            Qwertz
        </div>

        <div class="writeArea">
            <input type="text" id="input" name="input" placeholder="Type here...">
            <button id="validation">Validate</button>
        </div>

        <div class="scoreArea">
            Your score: <span>0</span>
        </div>
        
    </main>

    <div class="sidebar">
        <a href="/azerType">🎮 Play</a>
        <a href ="/progression">📊 My Progression</a>
    </div>

    
    <footer>
        @Copyright: OfGoodness 
    </footer>
</body>
</html>
