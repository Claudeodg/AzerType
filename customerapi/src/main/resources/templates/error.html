<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Something went wrong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .error-container {
            background-color: white;
            border-radius: 16px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 90%;
            border-top: 6px solid #1a73e8;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .error-code {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-block;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn-home:hover {
            background-color: #1558b0;
        }

        .divider {
            height: 1px;
            background-color: #f1f5f9;
            margin: 30px 0;
        }

        .footer-text {
            font-size: 12px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-icon">😕</div>
    <p class="error-code">Error</p>
    <h1>Something went wrong</h1>
    <p>An unexpected error occurred.<br/>Please try again later.</p>

    <a href="/azerType" class="btn-home">🎮 Go back to the game</a>

    <div class="divider"></div>
    <p class="footer-text">AzerType — If the problem persists, please contact support.</p>
</div>

</body>
</html>
